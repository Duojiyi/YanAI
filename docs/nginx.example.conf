# YanAI reverse proxy example.
# Replace server_name, upstream address, TLS settings, and client_max_body_size
# for your deployment.

upstream yanai_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name example.com;

    client_max_body_size 80m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Streaming OpenAI-compatible APIs. Keep buffering and transform layers off.
    location ^~ /v1/ {
        proxy_pass http://yanai_app;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no always;
        add_header Cache-Control "no-cache, no-transform" always;
    }

    # Admin register dashboard SSE. Token is sent via Authorization, not query.
    location = /api/register/events {
        access_log off;
        proxy_pass http://yanai_app;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no always;
        add_header Cache-Control "no-cache, no-transform" always;
    }

    # Other API endpoints should not be cached by browsers or shared caches.
    location ^~ /api/ {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        proxy_cache off;
        add_header Cache-Control "no-store" always;
    }

    # Hashed Next.js build assets.
    location ^~ /_next/static/ {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Bundled prompt assets. The frontend versions prompts.json with a query key.
    location ^~ /banana-prompt-quicker/ {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Uploaded/generated immutable assets.
    location ^~ /prompt-assets/ {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /images/ {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # HTML/app shell: revalidate so new builds roll out quickly.
    location / {
        proxy_pass http://yanai_app;
        proxy_buffering on;
        proxy_cache off;
        add_header Cache-Control "no-cache" always;
    }
}
